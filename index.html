<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡坦島隨身骰子</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        h1 { color: #d35400; margin-bottom: 5px; }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        input[type="text"] {
            padding: 10px;
            width: 65%;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 16px;
        }
        button {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #d35400; }
        .hidden { display: none; }
        .player-tag {
            display: inline-block;
            background: #e8f8f5;
            color: #117a65;
            padding: 6px 12px;
            border-radius: 20px;
            margin: 5px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        /* 當前玩家的高亮樣式 */
        .player-tag.active-now {
            background-color: #e67e22;
            color: white;
            font-weight: bold;
            transform: scale(1.1);
            box-shadow: 0 2px 4px rgba(230,126,34,0.4);
        }
        .current-turn {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .dice-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .dice {
            width: 65px;
            height: 65px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 4px rgba(0,0,0,0.15);
        }
        .dice-red { background-color: #e74c3c; }
        .dice-yellow { background-color: #f1c40f; color: #2c3e50; }
        .total-score {
            font-size: 54px;
            font-weight: bold;
            color: #d35400;
            margin: 10px 0;
        }
        .robber-alert {
            color: #c0392b;
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
        }
        .history-list {
            text-align: left;
            max-height: 220px;
            overflow-y: auto;
            background: #eee;
            padding: 10px 15px;
            border-radius: 6px;
            list-style: none;
            margin: 0;
        }
        .history-list li {
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
            font-size: 15px;
        }
        .btn-reset {
            background-color: #7f8c8d;
            font-size: 14px;
            padding: 8px 15px;
            margin-top: 15px;
        }
        .btn-reset:hover { background-color: #95a5a6; }
        .order-title {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 5px;
            text-align: left;
            padding-left: 5px;
        }
    </style>
</head>
<body>

    <h1>卡坦島骰子</h1>

    <!-- 步驟 1：輸入玩家 -->
    <div id="setup-stage" class="card">
        <h3>請按行動順序輸入玩家名稱</h3>
        <input type="text" id="player-input" placeholder="輸入名字後按新增">
        <button onclick="addPlayer()">新增</button>
        <div id="player-list-display" style="margin: 15px 0;"></div>
        <button id="start-game-btn" onclick="startGame()" class="hidden" style="background-color: #27ae60;">開始遊戲</button>
    </div>

    <!-- 步驟 2：遊戲進行 -->
    <div id="game-stage" class="card hidden">
        <!-- 新增的玩家順序面板 -->
        <div class="order-title">玩家順序：</div>
        <div id="game-player-order" style="margin-bottom: 20px; text-align: left;"></div>
        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">

        <div class="current-turn">當前輪到：<span id="active-player" style="color: #e67e22;"></span></div>
        
        <button onclick="rollDice()" style="font-size: 22px; padding: 12px 40px; width: 80%;">擲骰！</button>

        <div class="dice-container">
            <div id="dice1" class="dice dice-red">-</div>
            <div id="dice2" class="dice dice-yellow">-</div>
        </div>

        <div class="total-score" id="total-result">-</div>
        <div id="robber-notice" class="robber-alert hidden">⚠️ 點數 7！強盜來了！請檢查手牌。</div>
    </div>

    <!-- 步驟 3：歷史紀錄 -->
    <div id="history-stage" class="card hidden">
        <h3>擲骰歷史紀錄</h3>
        <ul id="history-log" class="history-list"></ul>
        <button class="btn-reset" onclick="resetGame()">重設並清除所有資料</button>
    </div>

    <script>
        let gameData = {
            players: [],
            currentPlayerIndex: 0,
            rollCount: 1,
            gameStarted: false,
            history: []
        };

        window.onload = function() {
            const savedData = localStorage.getItem('catan_dice_save');
            if (savedData) {
                gameData = JSON.parse(savedData);
                if (gameData.gameStarted) {
                    restoreGame();
                } else {
                    updatePlayerList();
                }
            }
        };

        function saveToStorage() {
            localStorage.setItem('catan_dice_save', JSON.stringify(gameData));
        }

        document.getElementById('player-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addPlayer();
        });

        function addPlayer() {
            const input = document.getElementById('player-input');
            const name = input.value.trim();
            if (name) {
                gameData.players.push(name);
                input.value = '';
                updatePlayerList();
                saveToStorage();
            }
        }

        function updatePlayerList() {
            const container = document.getElementById('player-list-display');
            container.innerHTML = gameData.players.map((p, idx) => `<span class="player-tag">${idx + 1}. ${p}</span>`).join('');
            
            if (gameData.players.length >= 2) {
                document.getElementById('start-game-btn').classList.remove('hidden');
            }
        }

        function startGame() {
            gameData.gameStarted = true;
            document.getElementById('setup-stage').classList.add('hidden');
            document.getElementById('game-stage').classList.remove('hidden');
            document.getElementById('history-stage').classList.remove('hidden');
            updateTurnDisplay();
            saveToStorage();
        }

        function restoreGame() {
            document.getElementById('setup-stage').classList.add('hidden');
            document.getElementById('game-stage').classList.remove('hidden');
            document.getElementById('history-stage').classList.remove('hidden');
            updateTurnDisplay();
            
            const log = document.getElementById('history-log');
            log.innerHTML = gameData.history.map(item => `<li>${item}</li>`).join('');
        }

        // 更新當前輪到的玩家以及上方的順序高亮
        function updateTurnDisplay() {
            document.getElementById('active-player').innerText = gameData.players[gameData.currentPlayerIndex];
            
            // 動態更新上方的玩家順序表
            const orderContainer = document.getElementById('game-player-order');
            orderContainer.innerHTML = gameData.players.map((p, idx) => {
                const isActive = idx === gameData.currentPlayerIndex ? 'active-now' : '';
                return `<span class="player-tag ${isActive}">${idx + 1}. ${p}</span>`;
            }).join(' ➔ '); // 用箭頭串聯展現輪替順序
        }

        function rollDice() {
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            const total = d1 + d2;
            const roller = gameData.players[gameData.currentPlayerIndex];

            document.getElementById('dice1').innerText = d1;
            document.getElementById('dice2').innerText = d2;
            document.getElementById('total-result').innerText = total;

            const robberNotice = document.getElementById('robber-notice');
            if (total === 7) {
                robberNotice.classList.remove('hidden');
            } else {
                robberNotice.classList.add('hidden');
            }

            const logHtml = `#${gameData.rollCount} <strong>${roller}</strong> 擲出了 <strong>${total}</strong> 點 (${d1} + ${d2})`;
            gameData.history.unshift(logHtml);

            const log = document.getElementById('history-log');
            const li = document.createElement('li');
            li.innerHTML = logHtml;
            log.insertBefore(li, log.firstChild);

            gameData.currentPlayerIndex = (gameData.currentPlayerIndex + 1) % gameData.players.length;
            gameData.rollCount++;
            updateTurnDisplay();
            saveToStorage();
        }

        function resetGame() {
            if (confirm("確定要清除所有玩家與歷史紀錄，重新開始嗎？")) {
                localStorage.removeItem('catan_dice_save');
                gameData = {
                    players: [],
                    currentPlayerIndex: 0,
                    rollCount: 1,
                    gameStarted: false,
                    history: []
                };
                
                document.getElementById('player-list-display').innerHTML = '';
                document.getElementById('history-log').innerHTML = '';
                document.getElementById('game-player-order').innerHTML = '';
                document.getElementById('dice1').innerText = '-';
                document.getElementById('dice2').innerText = '-';
                document.getElementById('total-result').innerText = '-';
                document.getElementById('robber-notice').classList.add('hidden');
                document.getElementById('start-game-btn').classList.add('hidden');
                
                document.getElementById('game-stage').classList.add('hidden');
                document.getElementById('history-stage').classList.add('hidden');
                document.getElementById('setup-stage').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
